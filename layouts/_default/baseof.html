<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <!-- 🎼 OpusLog 古典乐专属角标 (Favicon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%238B263E%22/><text y=%2275%22 x=%2213%22 font-size=%2270%22>🎼</text></svg>">
  <style>
    :root {
      --bg-color: #FDFBF7;
      --text-color: #2C2C2C;
      --accent-red: #8B263E;
      --border-color: #E2DDD5;
      --card-bg: #FFFFFF;
      --tag-bg: #F2EFE9;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Noto Serif SC", "Georgia", "Songti SC", serif;
      line-height: 1.8;
      margin: 0; padding: 0;
    }
    header {
      border-bottom: 2px solid var(--accent-red);
      padding: 2.5rem 1rem 1.2rem;
      text-align: center;
      background: #FAF7F2;
    }
    .site-title { font-size: 1.8rem; margin: 0; font-weight: bold; }
    .site-subtitle { font-size: 0.9rem; color: #666; margin-top: 0.4rem; font-style: italic; }
    nav { margin-top: 1.2rem; }
    nav a { margin: 0 12px; text-decoration: none; color: var(--accent-red); font-weight: 600; font-size: 0.95rem; }
    main { max-width: 800px; margin: 2.5rem auto; padding: 0 1.2rem; }
    footer { text-align: center; padding: 2.5rem 1rem; color: #888; font-size: 0.85rem; border-top: 1px solid var(--border-color); margin-top: 4rem; }
    .meta-badge {
      display: inline-block;
      background: var(--tag-bg);
      color: #555;
      font-size: 0.82rem;
      padding: 2px 8px;
      border-radius: 3px;
      margin-right: 6px;
    }
    .meta-catalog { font-family: "Courier New", monospace; font-weight: bold; color: var(--accent-red); }
    blockquote {
      border-left: 3px solid var(--accent-red);
      margin: 1.5rem 0;
      padding: 0.6rem 1rem;
      background: #F5F2EC;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="site-title"><a href="{{ .Site.BaseURL }}" style="text-decoration:none; color:inherit;">{{ .Site.Title }}</a></div>
    <div class="site-subtitle">{{ .Site.Params.subtitle }}</div>
    <nav>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    © {{ now.Format "2006" }} OpusLog · 典雅与序位的数字记录
  </footer>
</body>
</html>
