{{ define "main" }}
<div style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
  <h2 style="font-size: 1.3rem; color: var(--accent-red); margin-bottom: 0.3rem;">
    🎼 作曲家与标签总览索引
  </h2>
  <div style="font-size: 0.88rem; color: #666;">
    点击下方任意作曲家或分类标签，查看对应档案
  </div>
</div>

<div style="display: flex; flex-wrap: wrap; gap: 12px;">
  {{ range .Data.Terms.Alphabetical }}
  <a href="{{ .Page.RelPermalink }}" style="background: var(--card-bg); border: 1px solid var(--border-color); border-left: 3px solid var(--accent-red); padding: 10px 18px; border-radius: 4px; text-decoration: none; color: var(--text-color); font-size: 0.95rem; display: flex; align-items: center; transition: all 0.2s;">
    <strong style="color: var(--accent-red);">{{ .Page.Title }}</strong>
    <span style="font-size: 0.8rem; background: var(--tag-bg); color: #666; padding: 2px 6px; border-radius: 10px; margin-left: 8px;">{{ .Count }} 篇</span>
  </a>
  {{ end }}
</div>
{{ end }}
