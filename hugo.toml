# ----------------------------------------------------------------------
# 1. 站点基础信息 (Site Basic Info)
# ----------------------------------------------------------------------
baseURL = 'https://<mist-whisper>.github.io/opus-log/'
languageCode = 'zh-cn'
title = 'OpusLog · 古典乐赏析与演出数字档案库'

# ----------------------------------------------------------------------
# 2. 古典乐档案库专属全局参数 (Classical Music Custom Params)
# ----------------------------------------------------------------------
[params]
  subtitle = '从零开始的古典乐深度听感与现场观演档案'
  description = '记录每一次与伟大作品相遇的时刻'
  author = 'OpusLog Arc'
  
  # 古典乐音乐时期中文映射（用于页面自动化分类）
  [params.eras]
    Baroque = '巴洛克时期'
    Classical = '古典主义时期'
    Romantic = '浪漫主义时期'
    Impressionism = '印象派/20世纪初'
    Modern = '现代/20世纪后'

# ----------------------------------------------------------------------
# 3. 顶部主导航菜单 (Navigation Bar)
# ----------------------------------------------------------------------
[[menus.main]]
  name = '🏛️ 档案首页'
  url = '/'
  weight = 1

[[menus.main]]
  name = '🎼 作曲家'
  url = '/tags/'
  weight = 2

[[menus.main]]
  name = '💿 唱片名盘'
  url = '/tags/studio/'
  weight = 3

[[menus.main]]
  name = '🎟️ 现场观演'
  url = '/tags/live/'
  weight = 4

# ----------------------------------------------------------------------
# 4. 结构化数据解析规则
# ----------------------------------------------------------------------
[taxonomies]
  tag = 'tags'
  category = 'categories'
